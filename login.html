<!DOCTYPE html>
<html>

<body>

<h1>ログイン</h1>

<input
  type="password"
  id="password"
  placeholder="パスワード">

<br><br>

<input
  id="studentID"
  placeholder="学生番号">

<br><br>

<button onclick="login()">
ログイン
</button>

<script>

async function login(){

  const pw =
  document.getElementById("password").value;

  const studentID =
  document.getElementById("studentID").value;

  const response =
  await fetch(
    "GASのURL",
    {
      method:"POST",
      body:JSON.stringify({
        password: pw,
        studentID: studentID
      })
    }
  );

  const result =
  await response.text();

  if(result === "OK"){

    localStorage.setItem(
      "loggedIn",
      "true"
    );

    location.href =
    "index.html";

  }else{

    alert(
      "パスワードが違います"
    );
  }
}

</script>

</body>
</html>
