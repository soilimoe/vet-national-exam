<!DOCTYPE html>
<html>
<style>
body{
    max-width:800px;
    margin:auto;
    padding:15px;
}
  
button{
    width:100%;
    font-size:24px;
    padding:15px;
}

</style>

<body>

<h1>ログイン</h1>

<input
  type="password"
  id="password"
  placeholder="パスワード">

<br><br>

<input
  id="studentID"
  placeholder="学生番号">

<br><br>

<button onclick="login()">
ログイン
</button>

<script>

async function login(){

  const pw =
  document.getElementById("password").value;

  const studentID =
  document.getElementById("studentID").value;

  if(!/^\d{8}$/.test(studentID)){
    alert("学生番号は8桁の半角数字で入力してください");
    return;
  }

  const response =
  await fetch(
    "https://script.google.com/macros/s/AKfycbyKk5NzuTywt_vdRHAcpskyzS8SDWVUU8T6R0mjATzhVZa65_KWNyDVL7ADUaRWkcQy3Q/exec",
    {
      method:"POST",
      body:JSON.stringify({
        password: pw,
        studentID: studentID
      })
    }
  );

  const result =
  await response.text();

  if(result === "OK"){

    localStorage.setItem(
      "loggedIn",
      "true"
    );

    location.href =
    "index.html";

  }else{

    alert(
      "パスワードが違います"
    );
  }
}

</script>

</body>
</html>
