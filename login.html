<!DOCTYPE html>
<html>
<link rel="stylesheet" href="style.css">
<body>

<div class="login-box">

<h1>ログイン</h1>

<br>

<input
type="password"
id="password"
placeholder="パスワード">

<br><br>

<input
id="studentID"
placeholder="学生番号">

<button
class="login-btn"
onclick="login()">

ログイン

</button>

</div>
<script>

async function login(){

  const pw =
  document.getElementById("password").value;

  const studentID =
  document.getElementById("studentID").value;

  if(!/^\d{8}$/.test(studentID)){
    alert("学生番号は8桁の半角数字です");
    return;
  }

  const response =
  await fetch(
    "https://script.google.com/macros/s/AKfycbwtMUofKXcuujajuE85yP2eFjPrP_w5WSqAkpJzrXX3x581oeFCtAhFsCe4l7Wr49AWlg/exec",
    {
      method:"POST",
      body:JSON.stringify({
        password: pw,
        studentID: studentID
      })
    }
  );

  const result =
  await response.text();

  if(result === "OK"){

    localStorage.setItem(
      "loggedIn",
      "true"
    );

    location.href =
    "index.html";

  }else{

    alert("パスワードが違います");

  }
}

</script>

</body>
</html>
